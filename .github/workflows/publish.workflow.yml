# Build and publish open-pawlet to PyPI.
# Configure Trusted Publishing on https://pypi.org for this repo (GitHub Actions OIDC).

name: Publish to PyPI

on:
  push:
    branches:
      - release
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    # Skip runs on push that only creates a new branch or tag (first push to that ref), or any tag ref.
    if: github.event_name != 'push' || (github.event.created == false && !startsWith(github.ref, 'refs/tags/'))
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/open-pawlet
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build and check tools
        run: python -m pip install --upgrade pip build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Check distributions
        run: twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
