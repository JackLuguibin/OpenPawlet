name: Test Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  changes:
    if: github.event_name != 'push' || (github.event.created == false && !startsWith(github.ref, 'refs/tags/'))
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web:
              - 'src/console/web/**'

  console-web:
    needs: changes
    if: needs.changes.outputs.web == 'true' && (github.event_name != 'push' || (github.event.created == false && !startsWith(github.ref, 'refs/tags/')))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/console/web/package-lock.json
      - name: Install and test console web
        working-directory: src/console/web
        run: |
          npm ci
          npm run test

  test:
    # Skip runs on push that only creates a new branch or tag (first push to that ref), or any tag ref.
    if: github.event_name != 'push' || (github.event.created == false && !startsWith(github.ref, 'refs/tags/'))
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v4

    - name: Install system dependencies (Linux)
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y libolm-dev build-essential

    - name: Install dependencies
      run: uv sync --all-extras

    - name: Lint with ruff
      run: uv run ruff check nanobot --select F401,F841

    - name: Run tests
      run: uv run pytest tests/
