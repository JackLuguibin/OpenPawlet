name: Test Suite

on:
  workflow_dispatch:
  schedule:
    # 12:00 China Standard Time (UTC+8); GitHub cron is UTC
    - cron: "0 4 * * *"

jobs:
  console-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/console/web/package-lock.json
      - name: Install and test console web
        working-directory: src/console/web
        run: |
          npm ci
          npm run test

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v4

    - name: Install system dependencies (Linux)
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y libolm-dev build-essential

    - name: Install dependencies
      run: uv sync --all-extras

    - name: Lint with ruff
      run: uv run ruff check src/openpawlet --select F401,F841 --exclude src/openpawlet/tests

    - name: Run tests
      run: uv run pytest src/openpawlet/tests/
